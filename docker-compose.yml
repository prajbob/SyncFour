version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
    container_name: ccsi-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    container_name: ccsi-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - DATA_DIR=data/sample
      - PROCESSED_DIR=data/processed
    depends_on:
      - database

  database:
    image: postgis/postgis:16-3.4
    container_name: ccsi-database
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=food_security
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
      - ./db/seeds:/docker-entrypoint-initdb.d/seeds:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: ccsi-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:

